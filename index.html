<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>My Landing Page</title>
<style>
:root{--bg:#0a0a0f;--accent:#f0c040;--muted:#888;--text:#f0eee8;--surface:#13131a;}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:sans-serif;background:var(--bg);color:var(--text);}
header{position:fixed;top:0;left:0;right:0;height:60px;display:flex;align-items:center;justify-content:space-between;padding:0 5%;background:rgba(10,10,15,0.9);border-bottom:1px solid #333;z-index:100;}
.logo{color:var(--accent);font-size:1.4rem;font-weight:900;}
nav a{color:var(--muted);text-decoration:none;margin-left:1.5rem;font-size:0.9rem;}
nav a:hover{color:var(--accent);}
.hero{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:80px 5% 40px;}
.hero h1{font-size:3rem;font-weight:900;line-height:1.2;margin-bottom:1rem;}
.hero h1 span{color:var(--accent);}
.hero p{color:var(--muted);font-size:1rem;max-width:500px;line-height:1.8;margin-bottom:2rem;}
.btn{background:var(--accent);color:#000;padding:0.8rem 2rem;border-radius:4px;text-decoration:none;font-weight:700;}
footer{background:var(--surface);text-align:center;padding:2rem;border-top:1px solid #222;}
footer p{color:var(--muted);font-size:0.85rem;margin-bottom:0.8rem;}
footer a{color:var(--accent);text-decoration:none;margin:0 1rem;font-size:0.9rem;}
@media(max-width:600px){.hero h1{font-size:2rem;}nav{display:none;}}
</style>
</head>
<body>
<header>
<div class="logo">✦ Revathi</div>
<nav>
<a href="#">Home</a>
<a href="#">About</a>
<a href="#">Contact</a>
</nav>
</header>
<section class="hero">
<h1>Build Things<br/><span>That Matter.</span></h1>
<p>I am a web developer who crafts clean and beautiful digital experiences.</p>
<a href="#" class="btn">Get In Touch</a>
</section>
<footer>
<p>Made with love by Revathi</p>
<a href="#">GitHub</a>
<a href="#">LinkedIn</a>
<a href="#">Twitter</a>
</footer>
</body>
</html>
